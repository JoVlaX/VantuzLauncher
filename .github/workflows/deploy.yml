name: Build and Deploy Launcher

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Inject Version into Code
      shell: pwsh
      run: |
        $version = Get-Date -Format "yyyyMMdd.HHmm"
        $filePath = "./MainWindow.xaml.cs"
        (Get-Content $filePath) -replace 'BUILD_DATE_PLACEHOLDER', $version | Set-Content $filePath
        echo "Injected Version: $version"

    - name: Publish Launcher
      run: dotnet publish VantuzLauncher.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Generate Version File
      shell: pwsh
      run: |
        $version = Get-Date -Format "yyyyMMdd.HHmm"
        $version | Out-File -FilePath "./publish/launcher_version.txt" -Encoding ascii
        echo "Build Version: $version"

    - name: Cleanup Publish Folder
      shell: pwsh
      run: |
        # Оставляем только EXE и файл версии, удаляем остальное (PDB, JSON и т.д.)
        Get-ChildItem ./publish -Exclude "VantuzLauncher.exe", "launcher_version.txt" | Remove-Item -Recurse -Force

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: launcher-build
        path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: launcher-build
        path: ./publish

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.0
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: /www/troglobit.webhm.pro/
        port: 21
